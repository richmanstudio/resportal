services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: resportal-api
    env_file:
      - .env
    environment:
      NODE_ENV: production
      API_PORT: 4000
      DATABASE_URL: postgresql://resportal:resportal@postgres:5432/resportal
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: resportal-documents
      S3_ACCESS_KEY: resportal
      S3_SECRET_KEY: resportal-password
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    volumes:
      - api_storage:/app/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: /api
    container_name: resportal-web
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: resportal-postgres
    environment:
      POSTGRES_USER: resportal
      POSTGRES_PASSWORD: resportal
      POSTGRES_DB: resportal
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resportal -d resportal"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: resportal-redis

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: resportal-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: resportal
      MINIO_ROOT_PASSWORD: resportal-password
    volumes:
      - minio_data:/data

volumes:
  api_storage:
  postgres_data:
  minio_data:
